name: Liveboat feed build

on:
  schedule:
    - cron: "0 * * * *"
  push:
      tags:
        - 'build*'

jobs:
  liveboat-feed-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 'master'

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install sqlite3 snapd

      - name: Install newsboat
        run: source ./scripts/retry.sh && with_retry 5 sudo snap install newsboat

      - name: Fetch liveboat
        run: |
          mkdir -p ./bin
          # Pinned hash for liveboat v1.1.8 linux-musl (upstream .sha256sum file is broken, so we pin directly)
          EXPECTED="a566802b2ba21d1392bf876fc028e6493c1e390a936e4851dacc978674aad491"
          wget -O ./bin/liveboat https://github.com/exaroth/liveboat/releases/download/v1.1.8/liveboat-linux-musl
          ACTUAL=$(sha256sum ./bin/liveboat | awk '{print $1}')
          [ "$EXPECTED" = "$ACTUAL" ] || { echo "Checksum mismatch! expected $EXPECTED got $ACTUAL"; exit 1; }
          chmod +x ./bin/liveboat

      - name: Source options
        uses: falti/dotenv-action@v1.1.4
        with:
          path: ./config/page_options
          keys-case: bypass
          export-variables: true

      - name: Set up gitconfig
        run: |
          git config --local user.email "liveboat-builder@github.com"
          git config --local user.name "liveboat-feed-builder"
        shell: bash

      - name: Cleanup last build
        run: |
          if echo $(git log --oneline -1) | grep -q "Feed rebuild @"; then
              git reset --soft HEAD~1
              git stash push -m old_feeds ./docs
          fi
        shell: bash

      - name: Update Liveboat version and templates
        run: |
          make update;
          git add ./templates ./config
        if: env.ENABLE_AUTOMATIC_UPDATES == '1'

      - name: Run newsboat
        run: newsboat -u config/urls -C config/newsboat-config -c cache.db -x reload

      - name: Run liveboat
        run: ./bin/liveboat --template-path templates/default --config-file config/liveboat-config.toml

      - name: Truncate database
        run: |
          ./scripts/truncate_db ${{ env.NEWSBOAT_CACHE_RETENTION_DAYS }}
          git add ./cache.db
        if: env.PERSIST_NEWSBOAT_CACHE == '1'

      - name: Commit files
        id: commit
        run: |
          git add ./docs
          let ts=$(date +"%s")
          git diff-index --quiet HEAD || git commit -m "Feed rebuild @ ${ts}" -a
        shell: bash

      - name: Clean unreachable objects
        run: |
          git reflog expire --expire-unreachable=now
          git gc --prune=now

      - name: Push changes
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c  # master @ 2026-05-24
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          force_with_lease: true
          branch: master
